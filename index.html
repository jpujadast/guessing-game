
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .shell {
    width: 100%;
    min-height: 100dvh;
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    font-family: 'DM Sans', sans-serif;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    padding: clamp(10px,3vw,18px) clamp(16px,5vw,28px) 4px;
    font-size: clamp(10px,2.5vw,13px);
    font-family: 'Space Mono', monospace;
    color: rgba(255,255,255,0.4);
  }

  .game-header {
    padding: clamp(10px,2.5vw,18px) clamp(16px,5vw,28px) 0;
    text-align: center;
  }

  .game-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(9px,2vw,11px);
    letter-spacing: 3px;
    color: #6c6cff;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .game-message {
    font-size: clamp(13px,3.5vw,16px);
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
    min-height: clamp(40px,10vw,56px);
  }

  .number-display {
    margin: clamp(10px,3vw,20px) clamp(16px,5vw,28px);
    background: #1a1a2e;
    border-radius: clamp(14px,4vw,20px);
    padding: clamp(14px,4vw,24px);
    text-align: center;
    border: 0.5px solid rgba(108,108,255,0.3);
  }

  .range-label {
    font-size: clamp(9px,2vw,11px);
    color: rgba(255,255,255,0.35);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .range-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: clamp(10px,3vw,16px);
  }

  .range-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(11px,2.5vw,13px);
    color: rgba(255,255,255,0.4);
    min-width: 24px;
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #6c6cff, #a855f7);
    transition: width 0.4s ease;
  }

  .guess-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: clamp(8px,2vw,10px);
    height: clamp(8px,2vw,10px);
    border-radius: 50%;
    background: white;
    display: none;
    transition: left 0.4s ease;
  }

  .big-number {
    font-family: 'Space Mono', monospace;
    font-size: clamp(36px,10vw,56px);
    font-weight: 700;
    color: white;
    line-height: 1;
    transition: all 0.3s ease;
  }

  .hint-tag {
    margin-top: 8px;
    display: inline-block;
    font-size: clamp(11px,2.5vw,13px);
    padding: 4px 14px;
    border-radius: 20px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .hint-tag.higher { background: rgba(34,197,94,0.15); color: #4ade80; opacity: 1; }
  .hint-tag.lower  { background: rgba(239,68,68,0.15);  color: #f87171; opacity: 1; }
  .hint-tag.start  { background: rgba(108,108,255,0.15); color: #818cf8; opacity: 1; }

  .stats-row {
    display: flex;
    gap: clamp(8px,2vw,12px);
    padding: 0 clamp(16px,5vw,28px);
    margin-bottom: clamp(10px,2.5vw,16px);
  }

  .stat-card {
    flex: 1;
    background: #1a1a2e;
    border-radius: clamp(10px,3vw,14px);
    padding: clamp(10px,2.5vw,14px);
    text-align: center;
    border: 0.5px solid rgba(255,255,255,0.06);
  }

  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px,5vw,24px);
    font-weight: 700;
    color: white;
  }

  .stat-lbl {
    font-size: clamp(9px,2vw,11px);
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .best-badge {
    font-size: 10px;
    color: #fbbf24;
    background: rgba(251,191,36,0.12);
    border-radius: 20px;
    padding: 2px 8px;
    margin-top: 3px;
    display: inline-block;
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .input-area {
    padding: 0 clamp(16px,5vw,28px);
    margin-bottom: clamp(8px,2vw,14px);
  }

  .guess-input {
    width: 100%;
    background: #1a1a2e;
    border: 0.5px solid rgba(108,108,255,0.4);
    border-radius: clamp(10px,3vw,14px);
    padding: clamp(12px,3vw,16px) 20px;
    font-size: clamp(20px,5vw,26px);
    font-family: 'Space Mono', monospace;
    color: white;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .guess-input:focus { border-color: #6c6cff; }
  .guess-input::placeholder { color: rgba(255,255,255,0.15); font-size: clamp(12px,3vw,15px); }
  .guess-input:disabled { opacity: 0.4; }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(6px,1.5vw,10px);
    padding: 0 clamp(16px,5vw,28px);
    margin-bottom: clamp(10px,2.5vw,16px);
  }

  .numpad-btn {
    background: #1e1e32;
    border: none;
    border-radius: clamp(10px,2.5vw,14px);
    padding: clamp(12px,3.5vw,16px);
    font-size: clamp(16px,4vw,20px);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .numpad-btn:active { background: #2a2a48; transform: scale(0.93); }
  .numpad-btn.del-btn { font-size: clamp(11px,2.5vw,13px); color: rgba(255,100,100,0.8); }
  .numpad-btn.ok-btn  { background: #6c6cff; color: white; font-size: clamp(12px,2.5vw,14px); }
  .numpad-btn.ok-btn:active { background: #5555dd; }
  .numpad-btn:disabled { opacity: 0.3; pointer-events: none; }

  .action-btns {
    display: flex;
    gap: clamp(8px,2vw,12px);
    padding: 0 clamp(16px,5vw,28px) clamp(16px,4vw,24px);
    margin-top: auto;
  }

  .btn-start {
    flex: 2;
    background: #6c6cff;
    border: none;
    border-radius: clamp(10px,3vw,14px);
    padding: clamp(14px,3.5vw,18px);
    font-size: clamp(13px,3.5vw,16px);
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: white;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-start:active { transform: scale(0.97); background: #5555dd; }

  .btn-restart {
    flex: 1;
    background: #1e1e32;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: clamp(10px,3vw,14px);
    padding: clamp(14px,3.5vw,18px);
    font-size: clamp(12px,3vw,14px);
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-restart:active { transform: scale(0.97); background: #2a2a48; }

  .win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,13,26,0.96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(8px,2vw,14px);
    z-index: 10;
    padding: 24px;
  }

  .win-emoji { font-size: clamp(40px,10vw,56px); }
  .win-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px,5vw,24px);
    font-weight: 700;
    color: white;
  }
  .win-num {
    font-family: 'Space Mono', monospace;
    font-size: clamp(52px,14vw,72px);
    font-weight: 700;
    color: #6c6cff;
    line-height: 1;
  }
  .win-sub {
    font-size: clamp(13px,3.5vw,16px);
    color: rgba(255,255,255,0.45);
    text-align: center;
  }
  .win-badge {
    font-size: clamp(11px,2.5vw,13px);
    color: #fbbf24;
    background: rgba(251,191,36,0.12);
    border-radius: 20px;
    padding: 5px 16px;
    font-family: 'Space Mono', monospace;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .btn-play-again {
    margin-top: 8px;
    background: #6c6cff;
    border: none;
    border-radius: clamp(10px,3vw,14px);
    padding: clamp(14px,3.5vw,18px) clamp(32px,8vw,56px);
    font-size: clamp(14px,3.5vw,17px);
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    color: white;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-play-again:active { transform: scale(0.97); }
</style>

<div class="shell">
  <div class="status-bar">
    <span>9:41</span><span>■■■</span>
  </div>

  <div class="game-header">
    <div class="game-title">Number Quest</div>
    <div class="game-message" id="msg">Adivina el número que estoy pensando — ¡tienes todo el tiempo del mundo!</div>
  </div>

  <div class="number-display">
    <div class="range-label">RANGO</div>
    <div class="range-bar">
      <span class="range-num" id="lo">1</span>
      <div class="progress-track">
        <div class="progress-fill" id="pfill" style="width:50%"></div>
        <div class="guess-dot" id="gdot"></div>
      </div>
      <span class="range-num" id="hi">100</span>
    </div>
    <div class="big-number" id="bignum">?</div>
    <div class="hint-tag start" id="hint">Pulsa INICIAR</div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="tries">0</div>
      <div class="stat-lbl">Intentos</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="best">--</div>
      <div class="stat-lbl">Record</div>
      <div class="best-badge" id="bestbadge">nuevo record!</div>
    </div>
  </div>

  <div class="input-area">
    <input class="guess-input" id="ginput" type="number" placeholder="tu número" min="1" max="100" disabled />
  </div>

  <div class="numpad" id="numpad">
    <button class="numpad-btn" data-n="1" disabled>1</button>
    <button class="numpad-btn" data-n="2" disabled>2</button>
    <button class="numpad-btn" data-n="3" disabled>3</button>
    <button class="numpad-btn" data-n="4" disabled>4</button>
    <button class="numpad-btn" data-n="5" disabled>5</button>
    <button class="numpad-btn" data-n="6" disabled>6</button>
    <button class="numpad-btn" data-n="7" disabled>7</button>
    <button class="numpad-btn" data-n="8" disabled>8</button>
    <button class="numpad-btn" data-n="9" disabled>9</button>
    <button class="numpad-btn del-btn" id="delbtn" disabled>⌫ borrar</button>
    <button class="numpad-btn" data-n="0" disabled>0</button>
    <button class="numpad-btn ok-btn" id="okbtn" disabled>OK ↵</button>
  </div>

  <div class="action-btns">
    <button class="btn-start" id="startbtn" onclick="startGame()">INICIAR JUEGO</button>
    <button class="btn-restart" id="restartbtn" onclick="restartGame()" style="display:none">↺ Reiniciar</button>
  </div>

  <div class="win-overlay" id="winOverlay">
    <div class="win-emoji">🎉</div>
    <div class="win-title">¡Lo conseguiste!</div>
    <div class="win-num" id="winNum">42</div>
    <div class="win-sub" id="winSub">era el número correcto</div>
    <div class="win-badge" id="winBadge">★ nuevo record</div>
    <button class="btn-play-again" onclick="restartGame()">Jugar de nuevo</button>
  </div>
</div>

<script>
  let secret=0, count=0, best=null, playing=false, lo=1, hi=100;

  function startGame() {
    secret=Math.floor(Math.random()*100)+1;
    count=0; lo=1; hi=100; playing=true;
    setMsg("¡Perfecto! He elegido un número entre 1 y 100.");
    setHint("start","¡Haz tu primera suposición!");
    setBig("?");
    updateBar(50);
    setTries(0);
    enablePad(true);
    document.getElementById("ginput").disabled=false;
    document.getElementById("ginput").value="";
    document.getElementById("startbtn").style.display="none";
    document.getElementById("restartbtn").style.display="flex";
    document.getElementById("winOverlay").style.display="none";
    document.getElementById("lo").textContent="1";
    document.getElementById("hi").textContent="100";
    document.getElementById("gdot").style.display="none";
  }

  function restartGame() { startGame(); }

  function guess() {
    if (!playing) return;
    const v=parseInt(document.getElementById("ginput").value);
    if (!v||v<1||v>100) { setMsg("Introduce un número entre 1 y 100."); return; }
    count++; setTries(count); setBig(v); updateDot(v);
    if (v===secret) {
      win();
    } else if (v<secret) {
      lo=Math.max(lo,v+1);
      setMsg("Demasiado bajo. ¡Prueba más alto!");
      setHint("higher","▲ más alto");
    } else {
      hi=Math.min(hi,v-1);
      setMsg("Demasiado alto. ¡Prueba más bajo!");
      setHint("lower","▼ más bajo");
    }
    updateBar(((v-1)/99)*100);
    document.getElementById("ginput").value="";
    document.getElementById("lo").textContent=lo;
    document.getElementById("hi").textContent=hi;
  }

  function win() {
    playing=false; enablePad(false);
    document.getElementById("ginput").disabled=true;
    const isRecord=best===null||count<best;
    if(isRecord){ best=count; document.getElementById("best").textContent=count; }
    document.getElementById("winNum").textContent=secret;
    document.getElementById("winSub").textContent=count===1?"¡Adivinaste a la primera!":`Lo adivinaste en ${count} intentos`;
    document.getElementById("winBadge").style.opacity=isRecord?"1":"0";
    document.getElementById("winOverlay").style.display="flex";
  }

  function setMsg(t){document.getElementById("msg").textContent=t;}
  function setBig(v){document.getElementById("bignum").textContent=v;}
  function setTries(n){document.getElementById("tries").textContent=n;}
  function setHint(cls,txt){const h=document.getElementById("hint");h.className="hint-tag "+cls;h.textContent=txt;}
  function updateBar(pct){document.getElementById("pfill").style.width=pct+"%";}
  function updateDot(v){const d=document.getElementById("gdot");d.style.display="block";d.style.left=((v-1)/99*100)+"%";}
  function enablePad(on){document.querySelectorAll(".numpad-btn").forEach(b=>b.disabled=!on);}

  document.getElementById("numpad").addEventListener("click",function(e){
    const btn=e.target.closest(".numpad-btn");
    if(!btn||btn.disabled)return;
    const inp=document.getElementById("ginput");
    if(btn.id==="delbtn"){inp.value=inp.value.slice(0,-1);}
    else if(btn.id==="okbtn"){guess();}
    else{if(inp.value.length<3)inp.value+=btn.getAttribute("data-n");}
  });

  document.getElementById("ginput").addEventListener("keydown",function(e){if(e.key==="Enter")guess();});
</script>
