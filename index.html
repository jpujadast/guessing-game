<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d1f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Number Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: #0d0d1f; }

    .shell {
      width: 100%;
      height: 100dvh;
      background: #0d0d1f;
      display: flex;
      flex-direction: column;
      font-family: 'DM Sans', sans-serif;
      color: white;
      padding: 0 14px;
      gap: 8px;
      justify-content: space-between;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 12px 4px 0;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      color: #a78bfa;
      flex-shrink: 0;
    }

    .header { text-align: center; flex-shrink: 0; }
    .game-title {
      font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: 4px;
      color: #f0abfc; text-transform: uppercase; margin-bottom: 2px;
    }
    .game-message {
      font-size: 15px; font-weight: 700;
      color: #ffffff; line-height: 1.3;
    }

    .number-display {
      background: #1e1040; border-radius: 20px;
      padding: 10px 16px 8px; border: 2px solid #7c3aed;
      text-align: center; flex-shrink: 0;
    }
    .range-label {
      font-size: 9px; color: #c4b5fd;
      font-family: 'Space Mono', monospace;
      letter-spacing: 2px; margin-bottom: 6px;
    }
    .range-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .range-num {
      font-family: 'Space Mono', monospace;
      font-size: 13px; font-weight: 700;
      color: #e9d5ff; min-width: 26px; text-align: center;
    }
    .progress-track { flex: 1; height: 6px; background: #3b1f72; border-radius: 3px; position: relative; }
    .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg,#a855f7,#ec4899); transition: width 0.4s ease; }
    .guess-dot {
      position: absolute; top: 50%; transform: translate(-50%,-50%);
      width: 13px; height: 13px; border-radius: 50%;
      background: #fbbf24; border: 2px solid white;
      display: none; transition: left 0.4s ease;
    }
    .big-number {
      font-family: 'Space Mono', monospace;
      font-size: 64px; font-weight: 700; color: #f0abfc;
      line-height: 1; letter-spacing: -2px;
      text-shadow: 0 0 30px rgba(192,80,252,0.45);
    }
    .hint-tag {
      margin-top: 5px; display: inline-block;
      font-size: 13px; font-weight: 700;
      padding: 4px 16px; border-radius: 20px;
      opacity: 0; transition: opacity 0.3s;
    }
    .hint-tag.higher { background:#14532d; color:#86efac; border:1.5px solid #22c55e; opacity:1; }
    .hint-tag.lower  { background:#450a0a; color:#fca5a5; border:1.5px solid #ef4444; opacity:1; }
    .hint-tag.start  { background:#2e1065; color:#e9d5ff; border:1.5px solid #a855f7; opacity:1; }

    .stats-row { display: flex; gap: 10px; flex-shrink: 0; }
    .stat-card {
      flex: 1; border-radius: 16px;
      padding: 10px 8px; text-align: center;
      border: 2px solid; position: relative;
    }
    .stat-card.attempts { background:#1a0a3a; border-color:#7c3aed; }
    .stat-card.record   { background:#1a1a08; border-color:#ca8a04; }
    .stat-val { font-family:'Space Mono',monospace; font-size:30px; font-weight:700; line-height:1; }
    .stat-card.attempts .stat-val { color:#c4b5fd; }
    .stat-card.record   .stat-val { color:#fde68a; }
    .stat-lbl { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-top:3px; }
    .stat-card.attempts .stat-lbl { color:#a78bfa; }
    .stat-card.record   .stat-lbl { color:#fbbf24; }
    .best-badge {
      font-size:9px; color:#fbbf24; background:rgba(251,191,36,0.15);
      border-radius:20px; padding:1px 7px; margin-top:2px;
      display:inline-block; font-family:'Space Mono',monospace;
      opacity:0; transition:opacity 0.4s;
    }
    .btn-reset-record {
      position:absolute; top:6px; right:6px;
      background:rgba(202,138,4,0.2); border:1.5px solid #92400e;
      border-radius:7px; padding:3px 7px;
      font-size:11px; font-weight:700; color:#fbbf24;
      cursor:pointer; font-family:'DM Sans',sans-serif; touch-action:manipulation;
    }
    .btn-reset-record:active { background:rgba(202,138,4,0.4); }
    .confirm-bubble {
      display:none; position:absolute; top:-64px; right:0;
      background:#1a1005; border:2px solid #ca8a04;
      border-radius:12px; padding:8px 10px;
      white-space:nowrap; z-index:20;
      flex-direction:column; align-items:center; gap:6px;
    }
    .confirm-bubble.show { display:flex; }
    .confirm-bubble p { font-size:12px; font-weight:700; color:#fde68a; }
    .confirm-row { display:flex; gap:6px; }
    .btn-confirm-yes { background:#7f1d1d; border:1.5px solid #ef4444; border-radius:8px; padding:4px 12px; font-size:12px; font-weight:700; color:#fca5a5; cursor:pointer; font-family:'DM Sans',sans-serif; }
    .btn-confirm-no  { background:#1a0a3a; border:1.5px solid #4c1d95; border-radius:8px; padding:4px 12px; font-size:12px; font-weight:700; color:#c4b5fd; cursor:pointer; font-family:'DM Sans',sans-serif; }

    .input-area { flex-shrink:0; }
    .guess-input {
      width:100%; background:#1e1040; border:2px solid #7c3aed;
      border-radius:14px; padding:13px 16px;
      font-size:28px; font-family:'Space Mono',monospace;
      font-weight:700; color:#f0abfc; text-align:center;
      outline:none; -webkit-appearance:none; transition:border-color 0.2s;
    }
    .guess-input:focus { border-color:#e879f9; }
    .guess-input::placeholder { color:#6b21a8; font-size:15px; font-weight:400; }
    .guess-input:disabled { opacity:0.3; }

    .numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; flex-shrink:0; }
    .numpad-btn {
      background:#1e1040; border:2px solid #4c1d95;
      border-radius:14px; padding:16px 8px;
      font-size:24px; font-family:'Space Mono',monospace;
      font-weight:700; color:#e9d5ff; cursor:pointer;
      transition:background 0.1s,transform 0.08s;
      touch-action:manipulation; line-height:1;
    }
    .numpad-btn:active { background:#2e1065; transform:scale(0.91); }
    .numpad-btn.del-btn { font-size:13px; font-weight:700; color:#fca5a5; border-color:#7f1d1d; background:#1a0808; font-family:'DM Sans',sans-serif; }
    .numpad-btn.del-btn:active { background:#2a0f0f; }
    .numpad-btn.ok-btn { background:#7c3aed; border-color:#a855f7; color:white; font-size:17px; font-weight:800; font-family:'DM Sans',sans-serif; }
    .numpad-btn.ok-btn:active { background:#6d28d9; }
    .numpad-btn:disabled { opacity:0.2; pointer-events:none; }

    .action-btns { display:flex; gap:10px; flex-shrink:0; padding-bottom:14px; }
    .btn-start {
      flex:2; background:#7c3aed; border:2px solid #a855f7;
      border-radius:16px; padding:16px;
      font-size:18px; font-weight:800; font-family:'DM Sans',sans-serif;
      color:white; cursor:pointer; touch-action:manipulation; letter-spacing:1px;
      transition:background 0.15s,transform 0.1s;
    }
    .btn-start:active { transform:scale(0.97); background:#6d28d9; }
    .btn-restart {
      flex:1; background:#1a0a2e; border:2px solid #4c1d95;
      border-radius:16px; padding:16px;
      font-size:16px; font-weight:700; font-family:'DM Sans',sans-serif;
      color:#c4b5fd; cursor:pointer; touch-action:manipulation;
      transition:background 0.15s,transform 0.1s; display:none;
    }
    .btn-restart:active { transform:scale(0.97); background:#2e1065; }

    .win-overlay {
      position:fixed; inset:0; background:rgba(8,4,20,0.97);
      display:none; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; z-index:100; padding:32px 24px;
    }
    .win-emoji { font-size:64px; line-height:1; }
    .win-title { font-family:'Space Mono',monospace; font-size:24px; font-weight:700; color:#f0abfc; margin-top:4px; }
    .win-num { font-family:'Space Mono',monospace; font-size:100px; font-weight:700; color:#fbbf24; line-height:1; letter-spacing:-4px; text-shadow:0 0 60px rgba(251,191,36,0.5); }
    .win-sub { font-size:18px; font-weight:700; color:#c4b5fd; text-align:center; }
    .win-badge { font-size:14px; font-weight:700; color:#fbbf24; background:rgba(251,191,36,0.15); border:2px solid #ca8a04; border-radius:20px; padding:6px 20px; font-family:'Space Mono',monospace; opacity:0; transition:opacity 0.4s; }
    .btn-play-again { margin-top:14px; background:#7c3aed; border:2px solid #a855f7; border-radius:16px; padding:18px 52px; font-size:18px; font-weight:800; font-family:'DM Sans',sans-serif; color:white; cursor:pointer; touch-action:manipulation; }
    .btn-play-again:active { transform:scale(0.97); }
  </style>
</head>
<body>

<div class="shell">
  <div class="status-bar"><span>9:41</span><span>■■■</span></div>

  <div class="header">
    <div class="game-title">Number Quest</div>
    <div class="game-message" id="msg">Adivina el número que estoy pensando</div>
  </div>

  <div class="number-display">
    <div class="range-label">RANGO</div>
    <div class="range-bar">
      <span class="range-num" id="lo">1</span>
      <div class="progress-track">
        <div class="progress-fill" id="pfill" style="width:50%"></div>
        <div class="guess-dot" id="gdot"></div>
      </div>
      <span class="range-num" id="hi">100</span>
    </div>
    <div class="big-number" id="bignum">?</div>
    <div class="hint-tag start" id="hint">Pulsa INICIAR</div>
  </div>

  <div class="stats-row">
    <div class="stat-card attempts">
      <div class="stat-val" id="tries">0</div>
      <div class="stat-lbl">Intentos</div>
    </div>
    <div class="stat-card record" id="recordCard">
      <button class="btn-reset-record" onclick="toggleConfirm(event)">↺ reset</button>
      <div class="confirm-bubble" id="confirmBubble">
        <p>¿Borrar récord?</p>
        <div class="confirm-row">
          <button class="btn-confirm-yes" onclick="doResetRecord()">Sí, borrar</button>
          <button class="btn-confirm-no" onclick="hideConfirm()">Cancelar</button>
        </div>
      </div>
      <div class="stat-val" id="best">--</div>
      <div class="stat-lbl">Récord</div>
      <div class="best-badge" id="bestbadge">¡nuevo!</div>
    </div>
  </div>

  <div class="input-area">
    <input class="guess-input" id="ginput" type="number" placeholder="tu número aquí" min="1" max="100" disabled />
  </div>

  <div class="numpad" id="numpad">
    <button class="numpad-btn" data-n="1" disabled>1</button>
    <button class="numpad-btn" data-n="2" disabled>2</button>
    <button class="numpad-btn" data-n="3" disabled>3</button>
    <button class="numpad-btn" data-n="4" disabled>4</button>
    <button class="numpad-btn" data-n="5" disabled>5</button>
    <button class="numpad-btn" data-n="6" disabled>6</button>
    <button class="numpad-btn" data-n="7" disabled>7</button>
    <button class="numpad-btn" data-n="8" disabled>8</button>
    <button class="numpad-btn" data-n="9" disabled>9</button>
    <button class="numpad-btn del-btn" id="delbtn" disabled>⌫ borrar</button>
    <button class="numpad-btn" data-n="0" disabled>0</button>
    <button class="numpad-btn ok-btn" id="okbtn" disabled>OK ↵</button>
  </div>

  <div class="action-btns">
    <button class="btn-start" id="startbtn" onclick="startGame()">▶ INICIAR JUEGO</button>
    <button class="btn-restart" id="restartbtn" onclick="restartGame()">↺ Reiniciar</button>
  </div>

  <div class="win-overlay" id="winOverlay">
    <div class="win-emoji">🎉</div>
    <div class="win-title">¡Lo conseguiste!</div>
    <div class="win-num" id="winNum">42</div>
    <div class="win-sub" id="winSub">era el número correcto</div>
    <div class="win-badge" id="winBadge">★ ¡nuevo récord!</div>
    <button class="btn-play-again" onclick="restartGame()">Jugar de nuevo</button>
  </div>
</div>

<script>
  let secret=0, count=0, best=null, playing=false, lo=1, hi=100;

  function startGame() {
    secret=Math.floor(Math.random()*100)+1;
    count=0; lo=1; hi=100; playing=true;
    setMsg("¡He elegido un número! ¿Puedes adivinarlo?");
    setHint("start","¡Haz tu primera suposición!");
    setBig("?"); updateBar(50); setTries(0); enablePad(true);
    const inp=document.getElementById("ginput");
    inp.disabled=false; inp.value="";
    document.getElementById("startbtn").style.display="none";
    document.getElementById("restartbtn").style.display="flex";
    document.getElementById("winOverlay").style.display="none";
    document.getElementById("lo").textContent="1";
    document.getElementById("hi").textContent="100";
    document.getElementById("gdot").style.display="none";
    document.getElementById("bestbadge").style.opacity="0";
    hideConfirm();
  }

  function restartGame() { startGame(); }

  function guess() {
    if (!playing) return;
    const v=parseInt(document.getElementById("ginput").value);
    if (!v||v<1||v>100) { setMsg("Introduce un número entre 1 y 100."); return; }
    count++; setTries(count); setBig(v); updateDot(v);
    if (v===secret) {
      win();
    } else if (v<secret) {
      lo=Math.max(lo,v+1);
      setMsg("¡Demasiado bajo! Prueba un número mayor.");
      setHint("higher","▲ más alto");
    } else {
      hi=Math.min(hi,v-1);
      setMsg("¡Demasiado alto! Prueba un número menor.");
      setHint("lower","▼ más bajo");
    }
    updateBar(((v-1)/99)*100);
    document.getElementById("ginput").value="";
    document.getElementById("lo").textContent=lo;
    document.getElementById("hi").textContent=hi;
  }

  function win() {
    playing=false; enablePad(false);
    document.getElementById("ginput").disabled=true;
    const isRecord=best===null||count<best;
    if (isRecord) { best=count; document.getElementById("best").textContent=count; }
    document.getElementById("winNum").textContent=secret;
    document.getElementById("winSub").textContent=count===1?"¡Adivinaste a la primera! 🤯":`Lo adivinaste en ${count} intentos`;
    document.getElementById("winBadge").style.opacity=isRecord?"1":"0";
    document.getElementById("winOverlay").style.display="flex";
  }

  function toggleConfirm(e) { e.stopPropagation(); document.getElementById("confirmBubble").classList.toggle("show"); }
  function hideConfirm() { document.getElementById("confirmBubble").classList.remove("show"); }
  function doResetRecord() {
    best=null;
    document.getElementById("best").textContent="--";
    document.getElementById("bestbadge").style.opacity="0";
    hideConfirm();
  }
  document.addEventListener("click",function(e){
    if (!document.getElementById("recordCard").contains(e.target)) hideConfirm();
  });

  function setMsg(t){document.getElementById("msg").textContent=t;}
  function setBig(v){document.getElementById("bignum").textContent=v;}
  function setTries(n){document.getElementById("tries").textContent=n;}
  function setHint(cls,txt){const h=document.getElementById("hint");h.className="hint-tag "+cls;h.textContent=txt;}
  function updateBar(pct){document.getElementById("pfill").style.width=pct+"%";}
  function updateDot(v){const d=document.getElementById("gdot");d.style.display="block";d.style.left=((v-1)/99*100)+"%";}
  function enablePad(on){document.querySelectorAll(".numpad-btn").forEach(b=>b.disabled=!on);}

  document.getElementById("numpad").addEventListener("click",function(e){
    const btn=e.target.closest(".numpad-btn");
    if (!btn||btn.disabled) return;
    const inp=document.getElementById("ginput");
    if (btn.id==="delbtn") { inp.value=inp.value.slice(0,-1); }
    else if (btn.id==="okbtn") { guess(); }
    else { if (inp.value.length<3) inp.value+=btn.getAttribute("data-n"); }
  });

  document.getElementById("ginput").addEventListener("keydown",function(e){if(e.key==="Enter")guess();});
</script>
</body>
</html>
